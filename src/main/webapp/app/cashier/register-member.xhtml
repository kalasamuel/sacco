<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:p="http://primefaces.org/ui"
                 template="/WEB-INF/templates/layout.xhtml">
<ui:define name="title">Register Member</ui:define>
<ui:define name="content">

    <h1 class="page-title">Register New Member</h1>
    <p class="section-intro">Open a new savings account and register a member with clear identity and deposit information.</p>

    <h:form prependId="false" id="registerForm" enctype="multipart/form-data" styleClass="form-card">
        <input id="csrfTokenRegisterMember" type="hidden" name="csrfToken" value="#{csrfBean.token}"/>

        <div class="form-grid">
            <div class="input-group">
                <label for="membershipNumber">Membership Number</label>
                <p:inputText id="membershipNumber" value="#{memberRegistrationBean.membershipNumber}" readonly="true" styleClass="ui-inputtext"/>
                <p:message id="membershipNumberMsg" for="membershipNumber"/>
                <p class="text-caption mt-2">Automatically generated from the member's name. You can manually refresh the value by editing the first and last name fields.</p>
            </div>

            <div class="input-group">
                <label for="nationalId">National ID</label>
                <p:inputText id="nationalId" value="#{memberRegistrationBean.nationalId}" required="true" styleClass="ui-inputtext">
                    <p:ajax event="blur" listener="#{memberRegistrationBean.checkNationalIdDuplicate}"
                            update="nationalIdMsg" process="@this"/>
                </p:inputText>
                <p:message id="nationalIdMsg" for="nationalId"/>
            </div>

            <div class="input-group">
                <label for="firstName">First Name</label>
                <p:inputText id="firstName" value="#{memberRegistrationBean.firstName}" required="true" styleClass="ui-inputtext">
                    <p:ajax event="blur" listener="#{memberRegistrationBean.generateMembershipNumberIfBlank}"
                            update="membershipNumber" process="@this"/>
                </p:inputText>
            </div>

            <div class="input-group">
                <label for="lastName">Last Name</label>
                <p:inputText id="lastName" value="#{memberRegistrationBean.lastName}" required="true" styleClass="ui-inputtext">
                    <p:ajax event="blur" listener="#{memberRegistrationBean.generateMembershipNumberIfBlank}"
                            update="membershipNumber" process="@this"/>
                </p:inputText>
            </div>

            <div class="input-group">
                <label for="phone">Phone</label>
                <p:inputText id="phone" value="#{memberRegistrationBean.phone}" styleClass="ui-inputtext"/>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <p:inputText id="email" value="#{memberRegistrationBean.email}" styleClass="ui-inputtext"/>
            </div>

            <div class="input-group">
                <label for="role">Role</label>
                <p:selectOneMenu id="role" value="#{memberRegistrationBean.selectedRole}" required="true" styleClass="ui-inputtext">
                    <f:selectItems value="#{memberRegistrationBean.availableRoles}" var="role"
                                   itemValue="#{role}" itemLabel="#{memberRegistrationBean.roleLabel(role)}"/>
                </p:selectOneMenu>
                <p:message id="roleMsg" for="role"/>
            </div>

            <div class="input-group">
                <label for="initialDeposit">Initial Deposit (UGX)</label>
                <p:inputNumber id="initialDeposit" value="#{memberRegistrationBean.initialDeposit}" symbol="UGX " minValue="20000"
                               required="true" requiredMessage="Initial deposit must be at least UGX 20,000." styleClass="ui-inputnumber"/>
            </div>

            <div class="input-group">
                <label for="photo">Photo (optional, JPG/PNG, max 2MB)</label>
                <p:fileUpload id="photo" value="#{memberRegistrationBean.photo}" mode="simple"
                              allowTypes="/(\.|\/)(jpe?g|png)$/" sizeLimit="2097152" styleClass="ui-inputtext"/>
            </div>
        </div>

        <p:commandButton value="Register Member" action="#{memberRegistrationBean.register}"
                          ajax="false" styleClass="ui-button-primary button-primary mt-16"/>
    </h:form>

</ui:define>
</ui:composition>
