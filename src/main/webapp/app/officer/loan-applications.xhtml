<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:p="http://primefaces.org/ui"
                 template="/WEB-INF/templates/layout.xhtml">
<ui:define name="title">Loan Applications</ui:define>
<ui:define name="content">

    <f:metadata>
        <f:viewAction action="#{loanReviewBean.loadPending}"/>
    </f:metadata>

    <h1 class="page-title">Pending Loan Applications</h1>
    <p class="section-intro">This view is for loan officers to review submissions and verify completeness before an administrator makes the final approval decision.</p>

    <div class="table-card">
        <p:dataTable value="#{loanReviewBean.pendingLoans}" var="loan" emptyMessage="No pending applications." styleClass="ui-datatable-responsive">
            <p:column headerText="Member"><h:outputText value="#{loan.member.fullName}"/></p:column>
            <p:column headerText="Membership #"><h:outputText value="#{loan.member.membershipNumber}"/></p:column>
            <p:column headerText="Principal"><h:outputText value="#{loan.principal}" class="money"><f:converter converterId="moneyConverter"/></h:outputText></p:column>
            <p:column headerText="Total Due"><h:outputText value="#{loan.totalDue}" class="money"><f:converter converterId="moneyConverter"/></h:outputText></p:column>
            <p:column headerText="Applied"><h:outputText value="#{loan.appliedAt}"/></p:column>
        </p:dataTable>
    </div>

</ui:define>
</ui:composition>
