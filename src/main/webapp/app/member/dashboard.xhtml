<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:p="http://primefaces.org/ui"
                 template="/WEB-INF/templates/layout.xhtml">
<ui:define name="title">My Dashboard</ui:define>
<ui:define name="content">

    <f:metadata>
        <f:viewAction action="#{savingsBean.loadMember(currentUser.user.memberProfile.id)}"/>
        <f:viewAction action="#{loanApplicationBean.loadHistory(currentUser.user.memberProfile.id)}"/>
    </f:metadata>

    <h1 class="page-title">Welcome, #{currentUser.fullName}</h1>

    <div class="panel-card panel-card--compact">
        <h3 class="section-title">Savings Balance</h3>
        <div class="balance-figure"><h:outputText value="#{savingsBean.currentBalance}"><f:converter converterId="moneyConverter"/></h:outputText></div>
        <p>
            <a href="../common/statement?memberId=#{currentUser.user.memberProfile.id}"
               target="_blank">Download Account Statement (PDF)</a>
        </p>
    </div>

    <div class="section-header">
        <h3>My Loans</h3>
    </div>
    <div class="panel-card">
        <p:dataTable value="#{loanApplicationBean.loanHistory}" var="loan" emptyMessage="No loan applications yet.">
        <p:column headerText="Principal">
            <h:outputText value="#{loan.principal}"><f:converter converterId="moneyConverter"/></h:outputText>
        </p:column>
        <p:column headerText="Total Due">
            <h:outputText value="#{loan.totalDue}"><f:converter converterId="moneyConverter"/></h:outputText>
        </p:column>
        <p:column headerText="Remaining">
            <h:outputText value="#{loan.remainingBalance}"><f:converter converterId="moneyConverter"/></h:outputText>
        </p:column>
        <p:column headerText="Status">
            <h:outputText value="#{loan.status}"/>
        </p:column>
        <p:column headerText="Applied">
            <h:outputText value="#{loan.appliedAt}"/>
        </p:column>
    </p:dataTable>

</ui:define>
</ui:composition>
