<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                 xmlns:h="http://xmlns.jcp.org/jsf/html"
                 xmlns:f="http://xmlns.jcp.org/jsf/core"
                 xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                 xmlns:p="http://primefaces.org/ui"
                 template="/WEB-INF/templates/layout.xhtml">
<ui:define name="title">My Profile</ui:define>
<ui:define name="content">

    <h1 class="page-title">My Profile</h1>
    <p class="section-intro">View and edit your member profile details. All profile updates are saved immediately to your SACCO account.</p>

    <div class="panel-card max-width-560">
        <div class="grid-gap-18">
            <div>
                <div class="section-header"><h3>Member Details</h3></div>
                <div class="form-grid">
                    <div>
                        <label>Membership Number</label>
                        <p><h:outputText value="#{profileBean.member.membershipNumber}"/></p>
                    </div>
                    <div>
                        <label>Name</label>
                        <p><h:outputText value="#{profileBean.member.fullName}"/></p>
                    </div>
                    <div>
                        <label>National ID</label>
                        <p><h:outputText value="#{profileBean.member.nationalId}"/></p>
                    </div>
                </div>
            </div>

            <h:form prependId="false" styleClass="form-card">
                <input id="csrfTokenProfile" type="hidden" name="csrfToken" value="#{csrfBean.token}"/>

                <div class="input-group">
                    <label for="phone">Phone</label>
                    <p:inputText id="phone" value="#{profileBean.phone}" styleClass="ui-inputtext"/>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <p:inputText id="email" value="#{profileBean.email}" styleClass="ui-inputtext"/>
                </div>

                <p:commandButton value="Save Changes" action="#{profileBean.save}" update="@form" styleClass="ui-button-primary button-primary"/>
            </h:form>
        </div>
    </div>

</ui:define>
</ui:composition>
