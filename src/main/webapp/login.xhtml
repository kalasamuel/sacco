<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Kimwanyi SACCO — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet name="css/app.css"/>
</h:head>
<h:body>
    <div class="login-shell">
        <div class="login-card">
            <h1>Kimwanyi SACCO</h1>

            <h:form prependId="false">
                <input id="csrfTokenLogin" type="hidden" name="csrfToken" value="#{csrfBean.token}"/>

                <p:messages showDetail="true" closable="true"/>

                <div class="field-row input-group">
                    <label for="username">Username</label>
                    <p:inputText id="username" value="#{loginBean.username}" required="true"
                                 requiredMessage="Username is required." styleClass="full-width"/>
                </div>

                <div class="field-row input-group">
                    <label for="password">Password</label>
                    <p:password id="password" value="#{loginBean.password}" required="true"
                                requiredMessage="Password is required." feedback="false" styleClass="full-width"/>
                </div>

                <div class="login-form-actions">
                    <p:commandButton value="Log In" action="#{loginBean.login}" ajax="false"
                                      styleClass="ui-button-primary full-width"/>
                </div>
            </h:form>
        </div>
    </div>
</h:body>
</html>
